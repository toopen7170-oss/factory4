name: build android apk with buildozer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: checkout repository
      uses: actions/checkout@v4

    - name: set up python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache git libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev python3-dev python3-setuptools build-essential zip unzip openjdk-17-jdk
        sudo apt-get install -y libltdl-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good

    - name: install buildozer and dependencies
      run: |
        pip install --upgrade pip
        pip install Cython==3.0.10 buildozer

    - name: build apk with buildozer
      run: |
        yes | buildozer android debug
      env:
        AUTO_ACCEPT_SDK_LICENSE: "y"

    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: package-factory4-master
        path: bin/*.apk
